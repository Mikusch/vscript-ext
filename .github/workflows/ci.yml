name: Build Extension

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            container: ubuntu:22.04
            target: x86
            platform: linux32
            cc: clang
            cxx: clang++
          - os: ubuntu-24.04
            container: ubuntu:22.04
            target: x86_64
            platform: linux64
            cc: clang
            cxx: clang++
          - os: windows-2025
            target: x86
            platform: win32
          - os: windows-2025
            target: x86_64
            platform: win64

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}

    steps:
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl ca-certificates \
            python3 python3-pip \
            clang lld \
            gcc-multilib g++-multilib libstdc++6 lib32stdc++6 \
            libc6-dev libc6-dev-i386 linux-libc-dev \
            lib32z1-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSVC
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vsPath = & vswhere -latest -property installationPath
          $vcvars = Join-Path $vsPath 'VC\Auxiliary\Build\vcvarsall.bat'
          $arch = "${{ matrix.target == 'x86' && 'x86' || 'x64' }}"
          $before = @{}
          foreach ($v in Get-ChildItem env:) { $before[$v.Name] = $v.Value }
          cmd /c "`"$vcvars`" $arch >nul 2>&1 && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              $k, $v = $Matches[1], $Matches[2]
              if ($before[$k] -eq $v) { return }
              if ($k -ieq 'Path') {
                $old = $before['Path'] -split ';'
                ($v -split ';') | Where-Object { $_ -and $_ -notin $old } |
                  ForEach-Object { Add-Content $env:GITHUB_PATH $_ }
              } else {
                Add-Content $env:GITHUB_ENV "$k=$v"
              }
            }
          }

      - name: Checkout hl2sdks
        shell: bash
        run: |
          for sdk in tf2 css hl2dm dods; do
            git clone --depth 1 --branch $sdk https://github.com/alliedmodders/hl2sdk cache/hl2sdk-$sdk
          done

      - name: Checkout AMBuild
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/ambuild
          ref: master
          path: cache/ambuild
          fetch-depth: 1

      - name: Checkout SourceMod
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/sourcemod
          ref: 1.12-dev
          path: cache/sourcemod
          submodules: recursive
          fetch-depth: 1

      - name: Checkout Metamod:Source
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/metamod-source
          ref: 1.12-dev
          path: cache/metamod-source
          submodules: recursive
          fetch-depth: 1

      - name: Install AMBuild
        run: pip3 install ./cache/ambuild

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.cc }}" ]; then
            export CC="${{ matrix.cc }}"
            export CXX="${{ matrix.cxx }}"
          fi
          git config --global --add safe.directory "$(pwd)"
          mkdir -p build && cd build
          python3 ../configure.py \
            --sdk=tf2,css,hl2dm,dods \
            --mms-path="../cache/metamod-source" \
            --sm-path="../cache/sourcemod" \
            --sdk-root="../cache" \
            --enable-optimize \
            --enable-auto-versioning \
            --targets ${{ matrix.target }}
          ambuild

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: VScript-${{ matrix.platform }}
          path: build/package

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for version change
        id: version
        run: |
          version=$(cat product.version | tr -d '[:space:]')
          if gh release view "$version" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "tag=$version" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        if: steps.version.outputs.exists == 'false'
        uses: actions/download-artifact@v8

      - name: Package
        if: steps.version.outputs.exists == 'false'
        run: |
          mkdir VScript-linux VScript-windows
          cp -r VScript-linux32/* VScript-linux/
          cp -r VScript-linux64/* VScript-linux/
          cp -r VScript-win32/* VScript-windows/
          cp -r VScript-win64/* VScript-windows/
          cd VScript-linux && tar -czf ../VScript-linux.tar.gz .
          cd ../VScript-windows && zip -r ../VScript-windows.zip .

      - name: Create release
        if: steps.version.outputs.exists == 'false'
        run: >
          gh release create "${{ steps.version.outputs.tag }}"
          VScript-linux.tar.gz
          VScript-windows.zip
          --generate-notes
          --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
